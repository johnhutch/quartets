# Compose project for the Synology (DSM Container Manager → Projects).
#
# Dev is native — this file is production-only. The web image is built automatically
# via GitHub Actions and published to GHCR. Watchtower automatically pulls updates 
# and restarts the app. A cloudflared sidecar exposes the app at playquartets.com 
# via a Cloudflare Tunnel. Secrets live in a sibling .env on the NAS (gitignored) 
# — see .env.example and docs/DEPLOY.md.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quartets
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: quartets_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quartets -d quartets_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    # Automatically built via GitHub Actions and published to GHCR.
    image: ghcr.io/johnhutch/quartets:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Single Postgres for app + Solid cache/queue/cable (see config/database.yml).
      DATABASE_URL: postgres://quartets:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/quartets_production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:?set RAILS_MASTER_KEY in .env}
      # Superuser seed — db:prepare runs it on the first boot (db/seeds.rb).
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      # Run jobs inside Puma — no separate worker service.
      SOLID_QUEUE_IN_PUMA: "true"
      WEB_CONCURRENCY: "2"
      RAILS_MAX_THREADS: "3"
      # Public host — mailer link host (share URLs follow the request host).
      APP_HOST: ${APP_HOST:-playquartets.com}
      # Outbound mail (forgot-password). Leave SMTP_* blank until you have a
      # provider — mail simply won't send (the app boots fine either way).
      MAILER_SENDER: ${MAILER_SENDER:-no-reply@playquartets.com}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
    # Bypass Thruster and run Puma directly on its default port 3000. 
    # Cloudflare handles our proxy/SSL needs perfectly, so we don't need Thruster.
    command: ["./bin/rails", "server"]
    # The Cloudflare Tunnel reaches it at web:3000 over the compose network.
    ports:
      - "${WEB_PORT:-3000}:3000"

  solid_queue:
    build: .
    stdin_open: true
    tty: true
    command: bundle exec rake solid_queue:start
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgresql://postgres@database
    volumes:
      - .:/usr/src/app
      - gem_cache:/gems

  # Outbound-only tunnel: exposes the app at playquartets.com with no port
  # forwarding and no exposed home IP. Create the tunnel in Cloudflare Zero Trust,
  # set its public hostname → http://web:3000, and drop the token in .env.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      - web

  # Automatically updates containers when a new image is pushed to GHCR
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Check for updates every 5 minutes (300 seconds)
    command: --interval 300
    environment:
      # If your GHCR repo is private, Watchtower needs authentication to pull.
      # You can supply a GitHub Personal Access Token (PAT) via .env
      REPO_USER: ${GITHUB_ACTOR:-}
      REPO_PASS: ${GITHUB_TOKEN:-}

volumes:
  pgdata:
