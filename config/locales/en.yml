# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  # Homepage launchpad copy. All visible homepage text lives here so it can be
  # reworded without touching the view.
  home:
    page_title: "Quartets"
    nameplate: "NoTimes"
    wordmark: "Quartets"
    lede_html: "16 words. 4 groups. 4 mistakes."
    create:
      title: "Create"
      line: "Make your own. Send it to your friends or publish on the site. No signup needed!"
      cta: "Make a Quartet"
      aside_html: "Wanna see stats about your puzzles? Or about your own attempts (a trophy case!)? %{signup} whenever."
      signup: "Sign up"
    play:
      title: "Play"
      line: "Wanna just solve puzzles made by internet randos? Go for it." 
      cta: "Browse the archive"
    strip:
      head: "Jump in"
      by: "by %{author}"
      cta: "The whole archive"
    why:
      head: "Why play here"
      features:
        - lead: "Free."
          note: "All the puzzles and stats, free forever, devoid of paywall or \"pro\" tier nonsense."
        - lead: "Build your own."
          note: "Make your own Quartets with a pretty easy to use, mobile-friendly tool. Keep it private to send to just your friends, or publish on the site for strangers to take a crack at it."
        - lead: "Real stats."
          note: "Solve rate, mistakes per game, the wrong guesses everyone falls for. You gotta sign up to see it, but that's not a trick. We just need torecord who the owner is so we know who can see the stats."
        - lead: "Earn trophies."
          note: "Perfects. Or purple-first. Or go for the reverse-rainbow like a goddam all-star."
        - lead: "Leaderboards."
          note: "Coming soon — so start padding your record now."
      board:
        - cat: "NBA teams"
          words: "HEAT · JAZZ · NETS · SUNS"
        - cat: "___ dressing"
          words: "RANCH · BLUE · CAESAR · ITALIAN"
        - cat: "Trees"
          words: "MAPLE · OAK · PINE · BIRCH"
        - cat: "Kitchen tools"
          words: "WHISK · GRATER · LADLE · TONGS"
    about:
      head: "Ethically built"
      columns:
        - head: "Anonymous, private, and free"
          bullets:
            - label: "No ads"
              note: "Nothing flashing, nothing chasing your cursor, nothing auto-playing at you."
            - label: "No tracking"
              note: "No pixels, no fingerprinting, no \"anonymous\" analytics that aren't."
            - label: "No data collection"
              note: "We don't want to sell your data. Your data or puzzles aren't the product. There is no product."
            - label: "No AI training"
              note: "Scraper bots that train on your words get a 403. Go make your own, clankers."
            - label: "Free forever"
              note: "No paywall, no premium tier, no bait-and-switch down the road."
        - head: "<3 the free & open internet"
          bullets:
            - label: "Open source"
              note: "The whole thing's on GitHub. Read it, fork it, host your own."
              href: "https://github.com/johnhutch/quartets"
            - label: "MIT license"
              note: "some text about the MIT license in the readme."
              href: "https://linktoMITlicenseinfo.com"
            - label: "CC BY 4.0"
              note: "Take the puzzles, remix them, just credit the puzzle creator and link to their quartets profile." 
              href: "https://creativecommons.org/licenses/by/4.0/"
        - head: "Credits"
          bullets:
            - label: "Who's responsible for this?"
              note: "Sup. I'm Hutch."
              href: "https://johnhutch.com"
            - label: "Can you make me a thing?"
              note: "Sure. But it's my job, so, probably not for free. I run Swiftkick Web, so, hit us up if you need some help. Or just some advice. Whatever." 
      privacy: "Privacy Policy"
      disclaimer: "Not affiliated with The New York Times or any of its subsidiaries."

  # Snarky game-over quips (ADR-0011). One is picked at random per finished game.
  # Each bucket needles you toward the next rung — except reverse_rainbow, which has
  # nothing above it to diminish. Append freely; the game just samples the array.
  quartets:
    trophies:
      perfect: "Perfect"
      purple_first: "Purple first"
      reverse_rainbow: "Reverse rainbow"
    quips:
      loss:
        - "Oof."
        - "So close."
        - "Maybe next time."
        - "Eh, you'll get 'em next time."
        - "The puzzle won. It happens."
        - "Sad." 
        - "Embarrassing."
        - "Gross." 
        - "Shameful." 
      mistakes:
        - "A win's a win, I guess."
        - "Solved it. Barely."
        - "Good job! Ish." 
        - "You got there. Eventually."
        - "Nice."
        - "That'll do, pig."
        - "Good enough!"
        - "Not bad. Not great, but not bad." 
      perfect:
        - "Perfect! Pretty good." 
        - "Not a single mistake. Respectable. Not purple-first respectable, but it'll do." 
        - "Clean sweep! Now try cracking the hard group first."
        - "Perfect run. The purple-first players are condescendingly."
        - "Well done! Purple-first next time?"
        - "FLAWLESS VICTORY."
        - "PERFECT!"
        - "Look at you not making any mistakes! Not bad!"
      purple_first:
        - "PURPLE FIRST! PURPLE FIRST! PURPLE FIRST!"
        - "Ooo, purple first. Respect." 
        - "Hardest group out of the gate. Good stuff. Almost a perfect rainbow, even." 
        - "Purple first — slick. The reverse-rainbow folks are slicker tho." 
        - "Bold open. One ladder rung left to climb."
        - "So good it's almost a reverse rainbow!"
      reverse_rainbow:
        - "Reverse rainbow!"
        - "Purple to yellow, no mistakes. Hell yeah."
        - "The full reverse. Absolute filth. No notes."
        - "Hardest-first, perfect, in order."
        - "GOAT"
        - "Lookit that stack. Love it."
        - "Reverse rainbow! What a stud."
        - "Reverse rainbow? You nerd. Look at the nerdy nerd with their nerdy reverse rainbow. ...Nerd."
